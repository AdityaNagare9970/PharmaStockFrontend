<div class="admin-shell">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">🏥</span>
      <div>
        <div class="brand-name">PharmaStock</div>
        <div class="brand-role">Pharmacist</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <p class="nav-section-label">Modules</p>

      <a routerLink="/pharmacist/dashboard" routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
        <span class="nav-icon">🏠</span><span>Dashboard</span>
      </a>
      <a routerLink="/pharmacist/grn" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">📋</span><span>Goods Receipt (GRN)</span>
      </a>
      <a routerLink="/pharmacist/stock" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">📦</span><span>Stock</span>
      </a>
      <a routerLink="/pharmacist/transfers" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">🔄</span><span>Incoming Transfers</span>
      </a>
      <a routerLink="/pharmacist/dispense" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">💊</span><span>Dispense</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <span>🚪</span> Logout
      </button>
    </div>
  </aside>

  <main class="content-area">
    <router-outlet></router-outlet>
  </main>

</div>
