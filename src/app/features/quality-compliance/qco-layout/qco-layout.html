<div class="shell">

  <!-- ── Sidebar ─────────────────────────────────────── -->
  <aside class="sidebar">

    <div class="sidebar-brand">
      <span class="brand-icon">🏥</span>
      <div>
        <div class="brand-name">PharmaStock</div>
        <div class="brand-role">Quality & Compliance</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <p class="nav-section-label">Modules</p>

      <a routerLink="/qco/dashboard" routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
        <span class="nav-icon">🏠</span><span>Dashboard</span>
      </a>

      <a routerLink="/qco/quarantine" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">🔒</span><span>Quarantine</span>
      </a>

      <a routerLink="/qco/recalls" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">⚠️</span><span>Recall Notices</span>
      </a>

      <a routerLink="/qco/adjustments" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">⚖️</span><span>Stock Adjustments</span>
      </a>

      <a routerLink="/qco/expiry" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">📅</span><span>Expiry Monitor</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <span>🚪</span> Logout
      </button>
    </div>

  </aside>

  <!-- ── Main Content ───────────────────────────────── -->
  <main class="content-area">
    <router-outlet></router-outlet>
  </main>

</div>
