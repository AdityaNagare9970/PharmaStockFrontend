<div class="admin-shell">

  <!-- ── Sidebar ─────────────────────────────────────── -->
  <aside class="sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
      <span class="brand-icon">🏥</span>
      <div>
        <div class="brand-name">PharmaStock</div>
        <div class="brand-role">Admin Panel</div>
      </div>
    </div>

    <!-- Nav Links -->
    <nav class="sidebar-nav">
      <p class="nav-section-label">Modules</p>

      <a routerLink="/admin" routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link">
        <span class="nav-icon">🏠</span>
        <span>Dashboard</span>
      </a>

      <a routerLink="/admin/locations" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">📦</span>
        <span>Locations</span>
      </a>

      <a routerLink="/admin/users" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">👤</span>
        <span>Users</span>
      </a>

      <a routerLink="/admin/bins" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">🗃</span>
        <span>Bins</span>
      </a>

      <a routerLink="/admin/drugs" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">💊</span>
        <span>Drugs</span>
      </a>

      <a routerLink="/admin/items" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">📋</span>
        <span>Items</span>
      </a>

      <a routerLink="/admin/audit" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">📝</span>
        <span>Audit Log</span>
      </a>

      <a routerLink="/admin/replenishment-rules" routerLinkActive="active" class="nav-link">
        <span class="nav-icon">🔁</span>
        <span>Repl. Rules</span>
      </a>
    </nav>

    <!-- Logout -->
    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <span>🚪</span> Logout
      </button>
    </div>

  </aside>

  <!-- ── Main Content ───────────────────────────────── -->
  <main class="content-area">
    <router-outlet></router-outlet>
  </main>

</div>
